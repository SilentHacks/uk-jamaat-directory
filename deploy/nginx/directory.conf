# Optional nginx reverse proxy (alternative to Caddy).
# Replace example.com and certificate paths before use.
#
# Install: sudo cp deploy/nginx/directory.conf /etc/nginx/sites-available/directory
#          sudo ln -s /etc/nginx/sites-available/directory /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
#
# The API container should not publish port 8000 on the host; nginx reaches it
# via the Docker bridge (adjust upstream if your compose network differs).

upstream directory_api {
    server 127.0.0.1:8000;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name directory.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name directory.example.com;

    ssl_certificate     /etc/letsencrypt/live/directory.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/directory.example.com/privkey.pem;

    client_max_body_size 2m;

    location / {
        proxy_pass http://directory_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
