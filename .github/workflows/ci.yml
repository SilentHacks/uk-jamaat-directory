name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: directory
          POSTGRES_PASSWORD: directory
          POSTGRES_DB: directory_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U directory -d directory_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      UK_JAMAAT_TEST_POSTGRES: "1"
      DATABASE_URL: postgresql+asyncpg://directory:directory@localhost:5432/directory_test
      TEST_DATABASE_URL: postgresql+asyncpg://directory:directory@localhost:5432/directory_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests alembic

      - name: Alembic migrations
        run: alembic upgrade head

      - name: Pytest
        run: pytest
