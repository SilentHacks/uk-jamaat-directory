name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: directory
          POSTGRES_PASSWORD: directory
          POSTGRES_DB: directory_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U directory -d directory_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      UK_JAMAAT_TEST_POSTGRES: "1"
      DATABASE_URL: postgresql+asyncpg://directory:directory@localhost:5432/directory_test
      TEST_DATABASE_URL: postgresql+asyncpg://directory:directory@localhost:5432/directory_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests alembic

      - name: Production compose config
        run: make compose-production-config

      - name: Alembic migrations
        run: alembic upgrade head

      - name: Pytest
        run: pytest

      - name: API contracts are up to date
        run: |
          make export-contracts
          git diff --exit-code docs/api/ \
            || { echo "docs/api is stale — run 'make export-contracts' and commit."; exit 1; }

  build-and-push:
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
