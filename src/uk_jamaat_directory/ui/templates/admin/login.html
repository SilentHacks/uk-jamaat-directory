{% extends "base.html" %}
{% block title %}Admin login — UK Jamaat Directory{% endblock %}

{% block main %}
<section class="wrap login-page">
  <h1>Admin login</h1>
  {% if not configured %}
  <div class="flash err">Admin UI is not configured on this server.</div>
  {% else %}
  {% if error %}<div class="flash err">{{ error }}</div>{% endif %}
  <form method="post" action="/admin/login" class="stack-form" autocomplete="off">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
    <label>Admin key
      <input type="password" name="key" required autocomplete="current-password" />
    </label>
    <button type="submit" class="btn primary">Sign in</button>
  </form>
  {% endif %}
</section>
{% endblock %}
