<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}UK Jamaat Directory{% endblock %}</title>
    <meta name="description" content="{% block description %}Search UK mosques and view their jamaat (congregational prayer) timetables.{% endblock %}" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/assets/app.css" />
    <script src="/assets/htmx.min.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <div class="wrap">
        <a class="brand" href="/">UK Jamaat Directory</a>
        <nav>
          <a href="/">Search</a>
          <a href="/about">API &amp; data</a>
          <a href="/docs/">API reference</a>
          {% if admin_authenticated %}
          <a href="/admin">Admin</a>
          {% endif %}
        </nav>
      </div>
    </header>

    <main>{% block main %}{% endblock %}</main>

    <footer class="site-footer">
      <div class="wrap">
        <p>UK Jamaat Directory — a public data service. Every consumer is just a client.</p>
      </div>
    </footer>
  </body>
</html>
