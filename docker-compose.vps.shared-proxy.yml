# Shared reverse proxy integration (caddy-infra on a multi-tenant VPS).
#
# Do not start the bundled caddy service from docker-compose.vps.yml.
# Attach the API to the external "web" network so caddy-infra can route
# PUBLIC_DOMAIN → mosques:8000.
#
# Enable in .env: SHARED_PROXY=1
#
# Usage:
#   docker compose -f docker-compose.vps.yml -f docker-compose.vps.shared-proxy.yml up -d --build
#
# Install deploy/caddy/shared-infra/mosques.caddy under the caddy-infra sites
# directory, then reload caddy-infra.

services:
  api:
    networks:
      default: {}
      web:
        aliases:
          - mosques

  caddy:
    profiles:
      - bundled-caddy

networks:
  web:
    external: true
    name: web
